name: "CodeQL Advanced"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: actions
          build-mode: none
        - language: javascript-typescript
          build-mode: none
        - language: python
          build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    # START PROFILING IMMEDIATELY AFTER CHECKOUT
    - name: Start CPU Profiling
      run: |
        # Run top in batch mode, delay of 5 seconds, write to cpu_log.txt in the background
        top -b -d 5 > cpu_log.txt &
        echo $! > top_pid.txt

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    - name: Run manual build steps
      if: matrix.build-mode == 'manual'
      shell: bash
      run: |
        echo 'If you are using a "manual" build mode for one or more of the' \
          'languages you are analyzing, replace this with the commands to build' \
          'your code, for example:'
        echo '  make bootstrap'
        echo '  make release'
        exit 1

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"

    # STOP PROFILING AFTER CODEQL FINISHES
    - name: Stop CPU Profiling
      run: |
        kill $(cat top_pid.txt)
          
    # UPLOAD THE LOG WITH THE LANGUAGE NAME IN THE TITLE
    - name: Upload CPU Log
      uses: actions/upload-artifact@v4
      with:
        name: cpu-utilization-log-${{ matrix.language }}
        path: cpu_log.txt
